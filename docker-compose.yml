services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vramsherpa
      POSTGRES_USER: vramsherpa
      POSTGRES_PASSWORD: vramsherpa
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vramsherpa -d vramsherpa"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://vramsherpa:vramsherpa@db:5432/vramsherpa
      APP_ENV: dev
      ALLOWED_HOSTS: localhost,127.0.0.1,web,testserver
    command: sh -c "python -m vramsherpa.seed && uvicorn vramsherpa.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
