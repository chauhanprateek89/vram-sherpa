name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vramsherpa_test
          POSTGRES_USER: vramsherpa
          POSTGRES_PASSWORD: vramsherpa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vramsherpa -d vramsherpa_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+psycopg://vramsherpa:vramsherpa@localhost:5432/vramsherpa_test
      APP_ENV: test
      ALLOWED_HOSTS: testserver,localhost,127.0.0.1

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Tests
        run: pytest
