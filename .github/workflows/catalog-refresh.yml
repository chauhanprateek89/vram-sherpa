name: Catalog Refresh

on:
  schedule:
    - cron: "0 8 * * 0"
  workflow_dispatch:
    inputs:
      include_hf_metadata:
        description: "Fetch optional Hugging Face metadata"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  catalog-refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]" pyyaml

      - name: Generate seed catalog
        shell: bash
        run: |
          HF_ARGS=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.include_hf_metadata || 'false' }}" == "true" ]]; then
            HF_ARGS="--with-hf-metadata"
          fi

          python tools/ingest_catalog.py \
            --config tools/catalog_sources.yaml \
            --output-dir data \
            --summary-path /tmp/catalog-summary.json \
            ${HF_ARGS}

      - name: Validate seed catalog
        run: python tools/validate_catalog.py --data-dir data --config tools/catalog_sources.yaml

      - name: Capture summary
        id: summary
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          summary = json.loads(Path('/tmp/catalog-summary.json').read_text(encoding='utf-8'))
          print('body<<EOF')
          print(f"- GPUs: {summary['gpus']}")
          print(f"- Models: {summary['models']}")
          print(f"- Variants: {summary['variants']}")
          print('EOF')
          PY

      - name: Capture date
        id: date
        shell: bash
        run: echo "today=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Check for data changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- data/seed_gpus.json data/seed_models.json data/seed_variants.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/catalog-refresh
          delete-branch: true
          commit-message: "chore(catalog): refresh seed files ${{ steps.date.outputs.today }}"
          title: "Catalog refresh ${{ steps.date.outputs.today }}"
          body: |
            Automated catalog refresh generated by GitHub Actions.

            Summary counts:
            ${{ steps.summary.outputs.body }}

            Validation was executed via `tools/validate_catalog.py` before opening this PR.
          labels: |
            catalog
            automated-pr
          add-paths: |
            data/seed_gpus.json
            data/seed_models.json
            data/seed_variants.json

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No catalog changes detected."
