catalog:
  quant_bucket_bits_effective:
    Q4: 4.5
    Q5: 5.5
    Q8: 8.5
    FP16: 16.0
  huggingface:
    enabled: false
    timeout_seconds: 8
    retries: 2
    user_agent: VRAMSherpaCatalogBot/1.0
  variant_generation:
    quant_buckets:
    - Q4
    - Q5
    - Q8
    - FP16
    recommended_bucket: Q4
    notes: Quant bucket for VRAM Sherpa MVP sizing. Treat as an effective-bits proxy,
      not an exact on-disk format.
    sources:
    - https://github.com/ggerganov/llama.cpp/blob/master/docs/quantization.md
    - 'MVP spec: bits_effective for buckets Q4=4.5, Q5=5.5, Q8=8.5, FP16=16'
